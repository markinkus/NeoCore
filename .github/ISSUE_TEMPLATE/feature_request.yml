name: Feature request
description: Propose an enhancement to NeoCore
labels: ["enhancement", "design"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case is currently hard to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Suggested API or behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
