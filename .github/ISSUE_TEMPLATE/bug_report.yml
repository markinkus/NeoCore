name: Bug report
description: Report a reproducible defect in NeoCore
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include code snippet or command sequence.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Python version, OS, NeoCore version.
